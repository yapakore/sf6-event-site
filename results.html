<section class="page-title result-page">
  <h1>過去イベントリザルト</h1>
</section>

<section class="content">

  <h2>2026/4/23開催　采配戦線　主催：LOSER</h2>

  <h3 class="winner">
    優勝：<span>Red Team</span>
  </h3>

  <div class="team-box">

    <table>
      <tr>
        <th>チーム</th>
        <th>プレイヤー</th>
        <th>キャラ</th>
        <th>ランク</th>
      </tr>

      <!-- Red Team -->
      <tr>
        <td data-label="チーム" class="red-team">Red Team</td>
        <td data-label="プレイヤー">やっぱこれだね</td>
        <td data-label="キャラ" class="character-cell ryu">リュウ</td>
        <td data-label="ランク" class="rank-cell">
          <img src="images/master.png" alt="マスター">
        </td>
      </tr>

      <tr>
        <td data-label="チーム" class="red-team">Red Team</td>
        <td data-label="プレイヤー">マサトガイ</td>
        <td data-label="キャラ" class="character-cell jamie">ジェイミー</td>
        <td data-label="ランク" class="rank-cell">
          <img src="images/diamond.png" alt="ダイヤモンド">
        </td>
      </tr>

      <tr>
        <td data-label="チーム" class="red-team">Red Team</td>
        <td data-label="プレイヤー">ZOWAWA</td>
        <td data-label="キャラ" class="character-cell manon">マノン</td>
        <td data-label="ランク" class="rank-cell">
          <img src="images/diamond.png" alt="ダイヤモンド">
        </td>
      </tr>

      <!-- Blue Team -->
      <tr>
        <td data-label="チーム" class="blue-team">Blue Team</td>
        <td data-label="プレイヤー">あぶりさーもん</td>
        <td data-label="キャラ" class="character-cell ken">ケン</td>
        <td data-label="ランク" class="rank-cell">
          <img src="images/highmaster.png" alt="ハイマスター">
        </td>
      </tr>

      <tr>
        <td data-label="チーム" class="blue-team">Blue Team</td>
        <td data-label="プレイヤー">ももんたといいます</td>
        <td data-label="キャラ" class="character-cell marisa">マリーザ</td>
        <td data-label="ランク" class="rank-cell">
          <img src="images/diamond.png" alt="ダイヤモンド">
        </td>
      </tr>

      <tr>
        <td data-label="チーム" class="blue-team">Blue Team</td>
        <td data-label="プレイヤー">Hall</td>
        <td data-label="キャラ" class="character-cell ken">ケン</td>
        <td data-label="ランク" class="rank-cell">
          <img src="images/platinum.png" alt="プラチナ">
        </td>
      </tr>

    </table>

  </div>

</section>
